<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 4-Stroke Engine Simulation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="layout">
    <h1>Interactive 4-Stroke Engine Simulation</h1>
    <p class="intro">
      Physics-driven simulation with slider-crank piston kinematics, camshaft lobe lift, valve timing, spark delay,
      pressure states, flow logic, and real-time VCT phase shifts.
    </p>

    <section class="panel controls" aria-label="Engine controls">
      <div class="control-grid">
        <label>
          RPM
          <input id="rpm" type="range" min="0" max="6000" step="10" value="1200" />
          <span id="rpmValue">1200</span>
        </label>

        <label>
          Crank angle (0-720)
          <input id="angle" type="range" min="0" max="720" step="1" value="0" />
          <span id="angleValue">0.0°</span>
        </label>

        <label>
          Spark advance (BTDC)
          <input id="sparkAdvance" type="range" min="0" max="40" step="1" value="10" />
          <span id="sparkAdvanceValue">10°</span>
        </label>

        <label>
          Intake cam phase
          <input id="intakePhase" type="range" min="-40" max="40" step="1" value="0" />
          <span id="intakePhaseValue">0°</span>
        </label>

        <label>
          Exhaust cam phase
          <input id="exhaustPhase" type="range" min="-40" max="40" step="1" value="0" />
          <span id="exhaustPhaseValue">0°</span>
        </label>
      </div>

      <div class="step-controls">
        <button id="playPause" type="button">Pause</button>
        <button data-step="1" type="button">+1°</button>
        <button data-step="10" type="button">+10°</button>
        <button data-step="90" type="button">+90°</button>
      </div>

      <div class="toggles">
        <label><input id="showLabels" type="checkbox" checked /> Labels</label>
        <label><input id="showComponents" type="checkbox" checked /> Components</label>
        <label><input id="showFlow" type="checkbox" checked /> Flow</label>
      </div>
    </section>

    <section class="panel engine-area" aria-label="Engine visual simulation">
      <canvas id="engineCanvas" width="1120" height="620"></canvas>
    </section>

    <section class="panel telemetry" aria-label="Engine telemetry">
      <h2>Timing Reference and VCT Effects</h2>
      <div id="globalReadout" class="readout"></div>
      <div id="cylReadout" class="readout grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
